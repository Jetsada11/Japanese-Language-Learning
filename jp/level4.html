<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 4 - Type Answer (no Hint) | Japanese Learning</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dark-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .level-4-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .quiz-container {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border-top: 5px solid var(--level-4);
        }
        
        .character-display {
            font-size: 4.5rem;
            font-weight: bold;
            color: var(--primary-pink);
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease;
        }
        
        .input-container {
            margin-bottom: 30px;
        }
        
        .answer-input {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            font-size: 1.3rem;
            border: 3px solid var(--bg-secondary);
            border-radius: 15px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            text-align: center;
            transition: all 0.3s ease;
            font-family: 'Kanit', sans-serif;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: var(--level-4);
            box-shadow: 0 0 0 3px rgba(244, 67, 54, 0.2);
        }
        
        .answer-input.correct {
            border-color: var(--success);
            background: rgba(76, 175, 80, 0.1);
        }
        
        .answer-input.incorrect {
            border-color: var(--error);
            background: rgba(244, 67, 54, 0.1);
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .submit-btn {
            background: linear-gradient(45deg, var(--level-4), var(--accent-pink));
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.4);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .progress-bar {
            background: var(--bg-secondary);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, var(--level-4), var(--primary-pink));
            height: 100%;
            transition: width 0.5s ease;
        }
        
        .score-display {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .score-item {
            background: var(--bg-secondary);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .attempts-display {
            background: var(--level-4);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .feedback-message {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
            animation: fadeIn 0.5s ease;
        }
        
        .feedback-message.correct {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success);
            border: 2px solid var(--success);
        }
        
        .feedback-message.incorrect {
            background: rgba(244, 67, 54, 0.2);
            color: var(--error);
            border: 2px solid var(--error);
        }
        
        .difficulty-badge {
            background: var(--level-4);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: inline-block;
            font-weight: 500;
        }
        
        .next-btn {
            background: linear-gradient(45deg, var(--primary-pink), var(--accent-pink));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.4);
        }
        
        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--primary-pink);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-btn:hover {
            background: var(--primary-pink);
            color: white;
        }
        
        .result-container {
            text-align: center;
            padding: 40px;
        }
        
        .result-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--level-4), var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-pink);
        }
        
        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .memory-test-notice {
            background: rgba(244, 67, 54, 0.1);
            border: 2px solid var(--level-4);
            color: var(--level-4);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .keyboard-hint {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .timer-display {
            background: var(--bg-secondary);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .quiz-container {
                padding: 30px 20px;
            }
            
            .character-display {
                font-size: 3.5rem;
            }
            
            .answer-input {
                font-size: 1.1rem;
                padding: 15px;
            }
            
            .score-display {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="level-4-container">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
        </button>
        
        <div id="quizContainer" class="quiz-container">
            <div class="score-display">
                <div class="score-item">
                    <i class="fas fa-star"></i>
                    <span>คะแนน: <span id="score">0</span></span>
                </div>
                <div class="score-item">
                    <i class="fas fa-question-circle"></i>
                    <span>ข้อ <span id="currentQuestion">1</span>/<span id="totalQuestions">15</span></span>
                </div>
            </div>
            
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 6.67%"></div>
            </div>
            
            <div class="difficulty-badge">
                <i class="fas fa-brain"></i> ทดสอบความจำแท้จริง - ไม่มีเสียงช่วย
            </div>
            
            <div id="attemptsDisplay" class="attempts-display">
                <i class="fas fa-heart"></i> คงเหลือ: <span id="attempts">3</span> ครั้ง
            </div>
            
            <div class="timer-display">
                <i class="fas fa-clock"></i>
                <span>เวลา: <span id="timer">00:00</span></span>
            </div>
            
            <div class="memory-test-notice">
                <i class="fas fa-exclamation-triangle"></i>
                นี่คือการทดสอบความจำแท้จริง! ไม่มีเสียงช่วยเลย พึ่งพาความจำของคุณเท่านั้น
            </div>
            
            <div id="characterDisplay" class="character-display">
                あ
            </div>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="answerInput" 
                    class="answer-input" 
                    placeholder="พิมพ์คำตอบที่นี่..."
                    autocomplete="off"
                    onkeypress="handleKeyPress(event)"
                >
                <br>
                <button id="submitBtn" class="submit-btn" onclick="checkAnswer()">
                    <i class="fas fa-check"></i> ตรวจคำตอบ
                </button>
            </div>
            
            <div class="keyboard-hint">
                <i class="fas fa-keyboard"></i> 
                คำแนะนำ: ใช้แป้นพิมพ์ภาษาอังกฤษปกติ เช่น あ = a, し = shi, つ = tsu, ん = n
            </div>
            
            <div id="feedbackMessage"></div>
            
            <button id="nextBtn" class="next-btn" style="display: none;" onclick="nextQuestion()">
                <i class="fas fa-arrow-right"></i> ข้อถัดไป
            </button>
        </div>
        
        <div id="resultContainer" class="result-container" style="display: none;">
            <h2 class="result-title">🧠 ทดสอบความจำสำเร็จ!</h2>
            <div class="result-stats">
                <div class="stat-card">
                    <div class="stat-value" id="finalScore">0</div>
                    <div class="stat-label">คะแนนรวม</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="accuracy">0%</div>
                    <div class="stat-label">ความแม่นยำ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="timeSpent">0s</div>
                    <div class="stat-label">เวลาที่ใช้</div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="next-btn" onclick="restartQuiz()">
                    <i class="fas fa-redo"></i> เริ่มใหม่
                </button>
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-home"></i> กลับหน้าหลัก
                </button>
            </div>
        </div>
    </div>

    <script src="hiragana.js"></script>
    <script>
        // Game State
        let currentCharacter = '';
        let correctAnswer = '';
        let score = 0;
        let currentQuestionIndex = 0;
        let totalQuestions = 46;
        let attempts = 3;
        let startTime = Date.now();
        let timerInterval;
        let characterQueue = [];
        
        // Initialize game
        function initGame() {
            score = 0;
            currentQuestionIndex = 0;
            attempts = 3;
            startTime = Date.now();
            
            // Create queue of all hiragana characters
            characterQueue = HiraganaHelper.shuffleArray(HiraganaHelper.getAllCharacters());
            
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('timerDisplay').style.display = 'block';
            
            // Start timer
            startTimer();
            generateQuestion();
        }
        
        // Start timer
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        // Update timer
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // Generate new question
        function generateQuestion() {
            // Reset state
            attempts = 3;
            document.getElementById('attempts').textContent = attempts;
            document.getElementById('attemptsDisplay').style.display = 'inline-block';
            document.getElementById('feedbackMessage').innerHTML = '';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
            
            // Reset input
            const input = document.getElementById('answerInput');
            input.value = '';
            input.classList.remove('correct', 'incorrect');
            input.disabled = false;
            input.focus();
            
            // Get next character from queue
            currentCharacter = characterQueue[currentQuestionIndex];
            correctAnswer = HiraganaHelper.getRomaji(currentCharacter);
            
            // Update display
            document.getElementById('characterDisplay').textContent = currentCharacter;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('score').textContent = score;
            
            // Update progress bar
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        // Handle key press
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkAnswer();
            }
        }
        
        // Check answer
        function checkAnswer() {
            const input = document.getElementById('answerInput');
            const userAnswer = input.value.trim();
            
            if (!userAnswer) {
                showFeedback('กรุณาพิมพ์คำตอบ', 'incorrect');
                return;
            }
            
            const isCorrect = HiraganaHelper.checkAnswer(userAnswer, correctAnswer);
            
            if (isCorrect) {
                input.classList.add('correct');
                input.classList.remove('incorrect');
                score++;
                document.getElementById('score').textContent = score;
                
                showFeedback('ถูกต้อง! 🎉 ความจำดีมาก!', 'correct');
                
                // Disable input and button
                input.disabled = true;
                document.getElementById('submitBtn').disabled = true;
                
                // Auto-proceed to next question after delay
                setTimeout(() => {
                    if (currentQuestionIndex < totalQuestions - 1) {
                        nextQuestion();
                    } else {
                        showResults();
                    }
                }, 2000);
            } else {
                input.classList.add('incorrect');
                input.classList.remove('correct');
                attempts--;
                document.getElementById('attempts').textContent = attempts;
                
                if (attempts > 0) {
                    showFeedback(`ผิด! ลองใหม่อีก ${attempts} ครั้ง`, 'incorrect');
                    
                    // Clear input after delay
                    setTimeout(() => {
                        input.value = '';
                        input.classList.remove('incorrect');
                        input.focus();
                    }, 1500);
                } else {
                    showFeedback('หมดโอกาส! คำตอบที่ถูกต้องคือ: ' + correctAnswer, 'incorrect');
                    
                    // Disable input and show next button
                    input.disabled = true;
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('nextBtn').style.display = 'inline-flex';
                }
            }
        }
        
        // Show feedback
        function showFeedback(message, type) {
            const feedbackElement = document.getElementById('feedbackMessage');
            feedbackElement.className = `feedback-message ${type}`;
            feedbackElement.textContent = message;
        }
        
        // Next question
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestions) {
                generateQuestion();
            } else {
                showResults();
            }
        }
        
        // Show results
        function showResults() {
            clearInterval(timerInterval);
            
            const endTime = Date.now();
            const timeSpent = Math.round((endTime - startTime) / 1000);
            const accuracy = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('timeSpent').textContent = timeSpent + 's';
            
            // Save score
            ScoreManager.saveScore(4, score, totalQuestions);
            
            // Show encouragement based on performance
            if (accuracy >= 80) {
                document.querySelector('.result-title').innerHTML = '🏆 สุดยอด! ความจำของคุณยอดเยี่ยม!';
            } else if (accuracy >= 60) {
                document.querySelector('.result-title').innerHTML = '👍 ดีมาก! ฝึกอีกนิดจะเก่งขึ้น!';
            } else {
                document.querySelector('.result-title').innerHTML = '💪 พยายามดีแล้ว! ลองใหม่อีกครั้ง!';
            }
        }
        
        // Restart quiz
        function restartQuiz() {
            initGame();
        }
        
        // Go back to main page
        function goBack() {
            clearInterval(timerInterval);
            window.location.href = 'index.html';
        }
        
        // Initialize on load
        window.onload = function() {
            // Check for saved dark mode preference
            const body = document.body;
            if (localStorage.getItem('darkMode') === 'enabled') {
                body.classList.add('dark-mode');
            }
            
            initGame();
        };
        
        // Cleanup on page unload
        window.onbeforeunload = function() {
            clearInterval(timerInterval);
        };
    </script>
</body>
</html>
