<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 5 - Thai Vocabulary Writing | Japanese Learning</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dark-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body.level-5-page {
            background: #000000;
        }
        
        .level-5-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        
        .quiz-container {
            background: rgba(20, 20, 20, 0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 2px solid var(--level-5);
            box-shadow: 0 0 30px rgba(156, 39, 176, 0.3);
        }
        
        .vocabulary-display {
            background: rgba(156, 39, 176, 0.1);
            border: 2px solid var(--level-5);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .thai-word {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-pink);
            margin-bottom: 15px;
        }
        
        .romaji-hint {
            font-size: 1.3rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 10px;
        }
        
        .hiragana-slots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .hiragana-slot {
            width: 60px;
            height: 60px;
            border: 3px solid var(--level-5);
            border-radius: 10px;
            background: rgba(156, 39, 176, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-primary);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .hiragana-slot.filled {
            background: rgba(156, 39, 176, 0.3);
            border-color: var(--primary-pink);
            color: var(--primary-pink);
        }
        
        .hiragana-slot.correct {
            background: rgba(76, 175, 80, 0.2);
            border-color: var(--success);
            color: var(--success);
            animation: correctPulse 0.6s ease;
        }
        
        .hiragana-slot.incorrect {
            background: rgba(244, 67, 54, 0.2);
            border-color: var(--error);
            color: var(--error);
            animation: shake 0.5s ease;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .hiragana-pool {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            position: relative;
        }
        
        .pool-title {
            color: var(--text-secondary);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .hiragana-options {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 8px;
            max-width: 100%;
            justify-items: center;
        }
        
        .vowel-indicator {
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4444;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 10px;
            z-index: 10;
        }
        
        .vowel-row-a .vowel-indicator { background: #ff4444; }
        .vowel-row-i .vowel-indicator { background: #ff6666; }
        .vowel-row-u .vowel-indicator { background: #ff8888; }
        .vowel-row-e .vowel-indicator { background: #ffaaaa; }
        .vowel-row-o .vowel-indicator { background: #ffcccc; }
        
        .hiragana-option {
            width: 45px;
            height: 45px;
            background: var(--bg-secondary);
            border: 2px solid transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        /* Vertical columns from row layout */
        .hiragana-option:nth-child(1) { grid-column: 2; grid-row: 1; } /* あ */
        .hiragana-option:nth-child(2) { grid-column: 2; grid-row: 2; } /* い */
        .hiragana-option:nth-child(3) { grid-column: 2; grid-row: 3; } /* う */
        .hiragana-option:nth-child(4) { grid-column: 2; grid-row: 4; } /* え */
        .hiragana-option:nth-child(5) { grid-column: 2; grid-row: 5; } /* お */
        
        .hiragana-option:nth-child(6) { grid-column: 3; grid-row: 1; } /* か */
        .hiragana-option:nth-child(7) { grid-column: 3; grid-row: 2; } /* き */
        .hiragana-option:nth-child(8) { grid-column: 3; grid-row: 3; } /* く */
        .hiragana-option:nth-child(9) { grid-column: 3; grid-row: 4; } /* け */
        .hiragana-option:nth-child(10) { grid-column: 3; grid-row: 5; } /* こ */
        
        .hiragana-option:nth-child(11) { grid-column: 4; grid-row: 1; } /* さ */
        .hiragana-option:nth-child(12) { grid-column: 4; grid-row: 2; } /* し */
        .hiragana-option:nth-child(13) { grid-column: 4; grid-row: 3; } /* す */
        .hiragana-option:nth-child(14) { grid-column: 4; grid-row: 4; } /* せ */
        .hiragana-option:nth-child(15) { grid-column: 4; grid-row: 5; } /* そ */
        
        .hiragana-option:nth-child(16) { grid-column: 5; grid-row: 1; } /* た */
        .hiragana-option:nth-child(17) { grid-column: 5; grid-row: 2; } /* ち */
        .hiragana-option:nth-child(18) { grid-column: 5; grid-row: 3; } /* つ */
        .hiragana-option:nth-child(19) { grid-column: 5; grid-row: 4; } /* て */
        .hiragana-option:nth-child(20) { grid-column: 5; grid-row: 5; } /* と */
        
        .hiragana-option:nth-child(21) { grid-column: 6; grid-row: 1; } /* な */
        .hiragana-option:nth-child(22) { grid-column: 6; grid-row: 2; } /* に */
        .hiragana-option:nth-child(23) { grid-column: 6; grid-row: 3; } /* ぬ */
        .hiragana-option:nth-child(24) { grid-column: 6; grid-row: 4; } /* ね */
        .hiragana-option:nth-child(25) { grid-column: 6; grid-row: 5; } /* の */
        
        .hiragana-option:nth-child(26) { grid-column: 7; grid-row: 1; } /* は */
        .hiragana-option:nth-child(27) { grid-column: 7; grid-row: 2; } /* ひ */
        .hiragana-option:nth-child(28) { grid-column: 7; grid-row: 3; } /* ふ */
        .hiragana-option:nth-child(29) { grid-column: 7; grid-row: 4; } /* へ */
        .hiragana-option:nth-child(30) { grid-column: 7; grid-row: 5; } /* ほ */
        
        .hiragana-option:nth-child(31) { grid-column: 8; grid-row: 1; } /* ま */
        .hiragana-option:nth-child(32) { grid-column: 8; grid-row: 2; } /* み */
        .hiragana-option:nth-child(33) { grid-column: 8; grid-row: 3; } /* む */
        .hiragana-option:nth-child(34) { grid-column: 8; grid-row: 4; } /* め */
        .hiragana-option:nth-child(35) { grid-column: 8; grid-row: 5; } /* も */
        
        .hiragana-option:nth-child(36) { grid-column: 9; grid-row: 3; } /* や */
        .hiragana-option:nth-child(37) { grid-column: 9; grid-row: 4; } /* ゆ */
        .hiragana-option:nth-child(38) { grid-column: 9; grid-row: 5; } /* よ */
        
        .hiragana-option:nth-child(39) { grid-column: 10; grid-row: 1; } /* ら */
        .hiragana-option:nth-child(40) { grid-column: 10; grid-row: 2; } /* り */
        .hiragana-option:nth-child(41) { grid-column: 10; grid-row: 3; } /* る */
        .hiragana-option:nth-child(42) { grid-column: 10; grid-row: 4; } /* れ */
        .hiragana-option:nth-child(43) { grid-column: 10; grid-row: 5; } /* ろ */
        
        .hiragana-option:nth-child(44) { grid-column: 11; grid-row: 3; } /* わ */
        .hiragana-option:nth-child(45) { grid-column: 11; grid-row: 4; } /* を */
        .hiragana-option:nth-child(46) { grid-column: 11; grid-row: 5; } /* ん */
        
        .hiragana-option:hover {
            border-color: var(--level-5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.3);
        }
        
        .hiragana-option.selected {
            background: rgba(156, 39, 176, 0.3);
            border-color: var(--level-5);
            color: var(--primary-pink);
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(0.95);
        }
        
        .progress-bar {
            background: var(--bg-secondary);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, var(--level-5), var(--primary-pink));
            height: 100%;
            transition: width 0.5s ease;
        }
        
        .score-display {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .score-item {
            background: var(--bg-secondary);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .attempts-display {
            background: var(--level-5);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .feedback-message {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
            animation: fadeIn 0.5s ease;
        }
        
        .feedback-message.correct {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success);
            border: 2px solid var(--success);
        }
        
        .feedback-message.incorrect {
            background: rgba(244, 67, 54, 0.2);
            color: var(--error);
            border: 2px solid var(--error);
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .check-btn {
            background: linear-gradient(45deg, var(--level-5), var(--accent-pink));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .check-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(156, 39, 176, 0.4);
        }
        
        .check-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .clear-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--warning);
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .clear-btn:hover {
            background: var(--warning);
            color: white;
        }
        
        .next-btn {
            background: linear-gradient(45deg, var(--primary-pink), var(--accent-pink));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.4);
        }
        
        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--primary-pink);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-btn:hover {
            background: var(--primary-pink);
            color: white;
        }
        
        .result-container {
            text-align: center;
            padding: 40px;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 20px;
            border: 2px solid var(--level-5);
        }
        
        .result-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--level-5), var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-pink);
        }
        
        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .difficulty-badge {
            background: var(--level-5);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: inline-block;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .quiz-container {
                padding: 30px 20px;
            }
            
            .thai-word {
                font-size: 2rem;
            }
            
            .hiragana-slot {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
            
            .hiragana-option {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            
            .hiragana-options {
                grid-template-columns: repeat(5, 1fr);
                gap: 6px;
            }
            
            .score-display {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body class="level-5-page">
    <div class="level-5-container">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
        </button>
        
        <div id="quizContainer" class="quiz-container">
            <div class="score-display">
                <div class="score-item">
                    <i class="fas fa-star"></i>
                    <span>คะแนน: <span id="score">0</span></span>
                </div>
                <div class="score-item">
                    <i class="fas fa-question-circle"></i>
                    <span>ข้อ <span id="currentQuestion">1</span>/<span id="totalQuestions">50</span></span>
                </div>
            </div>
            
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 2%"></div>
            </div>
            
            <div class="difficulty-badge">
                <i class="fas fa-language"></i> ระดับยากพิเศษ - เขียนฮิรางานะจากคำศัพท์ไทย
            </div>
            
            <div id="attemptsDisplay" class="attempts-display">
                <i class="fas fa-heart"></i> คงเหลือ: <span id="attempts">3</span> ครั้ง
            </div>
            
            <div class="vocabulary-display">
                <div id="thaiWord" class="thai-word">สวัสดี</div>
                <div id="romajiHint" class="romaji-hint">(konnichiwa)</div>
            </div>
            
            <div class="hiragana-slots" id="hiraganaSlots">
                <!-- Slots will be generated here -->
            </div>
            
            <div class="hiragana-pool">
                <div class="pool-title">เลือกจากตัวอักษรฮิรางานะทั้งหมด (46 ตัว):</div>
                <div class="hiragana-options" id="hiraganaOptions">
                    <!-- Options will be generated here -->
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="clearBtn" class="clear-btn" onclick="clearSelection()">
                    <i class="fas fa-eraser"></i> ล้างคำตอบ
                </button>
                <button id="checkBtn" class="check-btn" onclick="checkAnswer()">
                    <i class="fas fa-check"></i> ตรวจคำตอบ
                </button>
            </div>
            
            <div id="feedbackMessage"></div>
            
            <button id="nextBtn" class="next-btn" style="display: none;" onclick="nextQuestion()">
                <i class="fas fa-arrow-right"></i> ข้อถัดไป
            </button>
        </div>
        
        <div id="resultContainer" class="result-container" style="display: none;">
            <h2 class="result-title">🏆 สุดยอด! ผ่านด่านสูงสุด!</h2>
            <div class="result-stats">
                <div class="stat-card">
                    <div class="stat-value" id="finalScore">0</div>
                    <div class="stat-label">คะแนนรวม</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="accuracy">0%</div>
                    <div class="stat-label">ความแม่นยำ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="timeSpent">0s</div>
                    <div class="stat-label">เวลาที่ใช้</div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="next-btn" onclick="restartQuiz()">
                    <i class="fas fa-redo"></i> เริ่มใหม่
                </button>
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-home"></i> กลับหน้าหลัก
                </button>
            </div>
        </div>
    </div>

    <script src="hiragana.js"></script>
    <script>
        // Game State
        let currentVocabulary = null;
        let correctAnswer = '';
        let selectedChars = [];
        let score = 0;
        let currentQuestionIndex = 0;
        let totalQuestions = 50;
        let attempts = 3;
        let startTime = Date.now();
        let availableOptions = [];
        
        // Initialize game
        function initGame() {
            score = 0;
            currentQuestionIndex = 0;
            attempts = 3;
            startTime = Date.now();
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            generateQuestion();
        }
        
        // Generate new question
        function generateQuestion() {
            // Reset state
            attempts = 3;
            selectedChars = [];
            document.getElementById('attempts').textContent = attempts;
            document.getElementById('attemptsDisplay').style.display = 'inline-block';
            document.getElementById('feedbackMessage').innerHTML = '';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('checkBtn').disabled = false;
            
            // Get random vocabulary from hiragana.js
            const allVocab = HiraganaHelper.getAllVocabulary();
            currentVocabulary = allVocab[Math.floor(Math.random() * allVocab.length)];
            correctAnswer = currentVocabulary.hiragana;
            
            // Update display
            document.getElementById('thaiWord').textContent = currentVocabulary.thai;
            document.getElementById('romajiHint').textContent = '(' + currentVocabulary.romaji + ')';
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('score').textContent = score;
            
            // Update progress bar
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Generate slots
            generateSlots();
            
            // Generate options
            generateOptions();
        }
        
        // Generate slots
        function generateSlots() {
            const slotsContainer = document.getElementById('hiraganaSlots');
            slotsContainer.innerHTML = '';
            
            for (let i = 0; i < correctAnswer.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'hiragana-slot';
                slot.dataset.index = i;
                slot.onclick = () => removeCharFromSlot(i);
                slotsContainer.appendChild(slot);
            }
        }
        
        // Generate options
        function generateOptions() {
            const optionsContainer = document.getElementById('hiraganaOptions');
            optionsContainer.innerHTML = '';
            
            // Get ALL hiragana characters in organized order
            const allHiragana = [
                'あ', 'い', 'う', 'え', 'お',
                'か', 'き', 'く', 'け', 'こ',
                'さ', 'し', 'す', 'せ', 'そ',
                'た', 'ち', 'つ', 'て', 'と',
                'な', 'に', 'ぬ', 'ね', 'の',
                'は', 'ひ', 'ふ', 'へ', 'ほ',
                'ま', 'み', 'む', 'め', 'も',
                'や', 'ゆ', 'よ',
                'ら', 'り', 'る', 'れ', 'ろ',
                'わ', 'を', 'ん'
            ];
            
            availableOptions = allHiragana;
            
            // Create option elements in organized order with vowel indicators
            availableOptions.forEach((char, index) => {
                const option = document.createElement('div');
                option.className = 'hiragana-option';
                option.textContent = char;
                option.dataset.char = char;
                option.dataset.index = index;
                option.onclick = () => selectChar(char, index);
                optionsContainer.appendChild(option);
                
                // Add vowel indicators for specific positions
                if (index === 0) { // あ - A row
                    const indicator = document.createElement('div');
                    indicator.className = 'vowel-indicator vowel-row-a';
                    indicator.textContent = 'A';
                    option.style.position = 'relative';
                    option.appendChild(indicator);
                } else if (index === 1) { // い - I row  
                    const indicator = document.createElement('div');
                    indicator.className = 'vowel-indicator vowel-row-i';
                    indicator.textContent = 'I';
                    option.style.position = 'relative';
                    option.appendChild(indicator);
                } else if (index === 2) { // う - U row
                    const indicator = document.createElement('div');
                    indicator.className = 'vowel-indicator vowel-row-u';
                    indicator.textContent = 'U';
                    option.style.position = 'relative';
                    option.appendChild(indicator);
                } else if (index === 3) { // え - E row
                    const indicator = document.createElement('div');
                    indicator.className = 'vowel-indicator vowel-row-e';
                    indicator.textContent = 'E';
                    option.style.position = 'relative';
                    option.appendChild(indicator);
                } else if (index === 4) { // お - O row
                    const indicator = document.createElement('div');
                    indicator.className = 'vowel-indicator vowel-row-o';
                    indicator.textContent = 'O';
                    option.style.position = 'relative';
                    option.appendChild(indicator);
                }
            });
        }
        
        // Select character
        function selectChar(char, index) {
            if (selectedChars.length >= correctAnswer.length) return;
            
            const option = document.querySelector(`[data-char="${char}"][data-index="${index}"]`);
            
            // Add to selected
            selectedChars.push(char);
            
            // Update slot
            const slot = document.querySelector(`[data-index="${selectedChars.length - 1}"]`);
            slot.textContent = char;
            slot.classList.add('filled');
        }
        
        // Remove character from slot
        function removeCharFromSlot(slotIndex) {
            if (selectedChars.length === 0) return;
            
            const removedChar = selectedChars[slotIndex];
            selectedChars.splice(slotIndex, 1);
            
            // Update slots
            for (let i = slotIndex; i < selectedChars.length; i++) {
                const slot = document.querySelector(`[data-index="${i}"]`);
                const nextSlot = document.querySelector(`[data-index="${i + 1}"]`);
                slot.textContent = nextSlot.textContent;
                if (!nextSlot.textContent) {
                    slot.classList.remove('filled');
                }
            }
            
            // Clear last slot
            const lastSlot = document.querySelector(`[data-index="${selectedChars.length}"]`);
            lastSlot.textContent = '';
            lastSlot.classList.remove('filled');
            
            // Don't need to re-enable options since we can select same char multiple times
        }
        
        // Clear selection
        function clearSelection() {
            selectedChars = [];
            
            // Clear slots
            document.querySelectorAll('.hiragana-slot').forEach(slot => {
                slot.textContent = '';
                slot.classList.remove('filled', 'correct', 'incorrect');
            });
            
            // Re-enable options
            document.querySelectorAll('.hiragana-option').forEach(option => {
                option.classList.remove('selected');
            });
        }
        
        // Check answer
        function checkAnswer() {
            if (selectedChars.length !== correctAnswer.length) {
                showFeedback('กรุณาเลือกตัวอักษรให้ครบทุกช่อง', 'incorrect');
                return;
            }
            
            const userAnswer = selectedChars.join('');
            const isCorrect = userAnswer === correctAnswer;
            
            // Update slots visual feedback
            const slots = document.querySelectorAll('.hiragana-slot');
            slots.forEach((slot, index) => {
                if (selectedChars[index] === correctAnswer[index]) {
                    slot.classList.add('correct');
                    slot.classList.remove('incorrect');
                } else {
                    slot.classList.add('incorrect');
                    slot.classList.remove('correct');
                }
            });
            
            if (isCorrect) {
                score++;
                document.getElementById('score').textContent = score;
                showFeedback('ถูกต้อง! 🎉 ยอดเยี่ยมมาก!', 'correct');
                
                // Disable check button
                document.getElementById('checkBtn').disabled = true;
                
                // Auto-proceed to next question after delay
                setTimeout(() => {
                    if (currentQuestionIndex < totalQuestions - 1) {
                        nextQuestion();
                    } else {
                        showResults();
                    }
                }, 2000);
            } else {
                attempts--;
                document.getElementById('attempts').textContent = attempts;
                
                if (attempts > 0) {
                    showFeedback(`ผิด! ลองใหม่อีก ${attempts} ครั้ง`, 'incorrect');
                    
                    // Clear after delay
                    setTimeout(() => {
                        clearSelection();
                    }, 2000);
                } else {
                    showFeedback('หมดโอกาส! คำตอบที่ถูกต้องคือ: ' + correctAnswer, 'incorrect');
                    
                    // Disable check button and show next button
                    document.getElementById('checkBtn').disabled = true;
                    document.getElementById('nextBtn').style.display = 'inline-flex';
                    
                    // Show correct answer in slots
                    slots.forEach((slot, index) => {
                        slot.textContent = correctAnswer[index];
                        slot.classList.add('correct');
                        slot.classList.remove('incorrect');
                    });
                }
            }
        }
        
        // Show feedback
        function showFeedback(message, type) {
            const feedbackElement = document.getElementById('feedbackMessage');
            feedbackElement.className = `feedback-message ${type}`;
            feedbackElement.textContent = message;
        }
        
        // Next question
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestions) {
                generateQuestion();
            } else {
                showResults();
            }
        }
        
        // Show results
        function showResults() {
            const endTime = Date.now();
            const timeSpent = Math.round((endTime - startTime) / 1000);
            const accuracy = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('timeSpent').textContent = timeSpent + 's';
            
            // Save score
            ScoreManager.saveScore(5, score, totalQuestions);
            
            // Save any custom vocabulary that might have been added during gameplay
            saveCustomVocabulary();
            
            // Show encouragement based on performance
            if (accuracy >= 80) {
                document.querySelector('.result-title').innerHTML = '🏆 สุดยอด! คุณเป็นเจ้าแห่งฮิรางานะ!';
            } else if (accuracy >= 60) {
                document.querySelector('.result-title').innerHTML = '🌟 ยอดเยี่ยม! ฝึกอีกเล็กน้อยจะเก่งขึ้น!';
            } else {
                document.querySelector('.result-title').innerHTML = '💪 พยายามดีแล้ว! อย่าท้อถอย!';
            }
        }
        
        // Save custom vocabulary function
        function saveCustomVocabulary() {
            // This function saves any custom vocabulary that might have been added
            // Currently Level 5 only uses default vocabulary, so this is a placeholder
            // for future custom vocabulary functionality
            console.log('Custom vocabulary save completed');
        }
        
        // Restart quiz
        function restartQuiz() {
            initGame();
        }
        
        // Go back to main page
        function goBack() {
            window.location.href = 'index.html';
        }
        
        // Initialize on load
        window.onload = function() {
            // Check for saved dark mode preference
            const body = document.body;
            if (localStorage.getItem('darkMode') === 'enabled') {
                body.classList.add('dark-mode');
            }
            
            initGame();
        };
    </script>
</body>
</html>
