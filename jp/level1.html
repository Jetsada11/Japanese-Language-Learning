<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 1 - Multiple Choice (3 Options) | Japanese Learning</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dark-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .level-1-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .quiz-container {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border-top: 5px solid var(--level-1);
        }
        
        .character-display {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary-pink);
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        .sound-hint {
            background: var(--level-1);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .sound-hint:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        
        .sound-hint:active {
            transform: scale(0.95);
        }
        
        .hint-line {
            background: rgba(255, 193, 7, 0.1);
            border: 2px solid rgba(255, 193, 7, 0.3);
            border-radius: 10px;
            padding: 12px 20px;
            margin: 15px 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.5s ease;
        }
        
        .hint-line i {
            color: #ffc107;
        }
        
        #hintText {
            font-weight: 700;
            color: var(--primary-pink);
            font-size: 1.2rem;
        }
        
        .options-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .option-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid transparent;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .option-btn:hover {
            border-color: var(--level-1);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.2);
        }
        
        .option-btn.correct {
            background: var(--level-1);
            color: white;
            border-color: var(--level-1);
            animation: correctPulse 0.6s ease;
        }
        
        .option-btn.incorrect {
            background: var(--error);
            color: white;
            border-color: var(--error);
            animation: shake 0.5s ease;
        }
        
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .progress-bar {
            background: var(--bg-secondary);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, var(--level-1), var(--primary-pink));
            height: 100%;
            transition: width 0.5s ease;
        }
        
        .score-display {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .score-item {
            background: var(--bg-secondary);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .attempts-display {
            background: var(--warning);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .feedback-message {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
            animation: fadeIn 0.5s ease;
        }
        
        .feedback-message.correct {
            background: rgba(76, 175, 80, 0.2);
            color: var(--level-1);
            border: 2px solid var(--level-1);
        }
        
        .feedback-message.incorrect {
            background: rgba(244, 67, 54, 0.2);
            color: var(--error);
            border: 2px solid var(--error);
        }
        
        .next-btn {
            background: linear-gradient(45deg, var(--primary-pink), var(--accent-pink));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.4);
        }
        
        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--primary-pink);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-btn:hover {
            background: var(--primary-pink);
            color: white;
        }
        
        .result-container {
            text-align: center;
            padding: 40px;
        }
        
        .result-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--level-1), var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-pink);
        }
        
        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        @media (max-width: 768px) {
            .quiz-container {
                padding: 30px 20px;
            }
            
            .character-display {
                font-size: 3rem;
            }
            
            .options-container {
                grid-template-columns: 1fr;
            }
            
            .score-display {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="level-1-container">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
        </button>
        
        <div id="quizContainer" class="quiz-container">
            <div class="score-display">
                <div class="score-item">
                    <i class="fas fa-star"></i>
                    <span>คะแนน: <span id="score">0</span></span>
                </div>
                <div class="score-item">
                    <i class="fas fa-question-circle"></i>
                    <span>ข้อ <span id="currentQuestion">1</span>/<span id="totalQuestions">10</span></span>
                </div>
            </div>
            
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 10%"></div>
            </div>
            
            <div id="attemptsDisplay" class="attempts-display">
                <i class="fas fa-heart"></i> คงเหลือ: <span id="attempts">3</span> ครั้ง
            </div>
            
            <div id="characterDisplay" class="character-display">
                あ
            </div>
            
            <div id="hintLine" class="hint-line">
                <i class="fas fa-lightbulb"></i> คำใบ้: <span id="hintText">A</span>
            </div>
            
            <button id="soundHint" class="sound-hint" onclick="playSound()">
                <i class="fas fa-volume-up"></i> เล่นเสียง
            </button>
            
            <div id="optionsContainer" class="options-container">
                <!-- Options will be generated here -->
            </div>
            
            <div id="feedbackMessage"></div>
            
            <button id="nextBtn" class="next-btn" style="display: none;" onclick="nextQuestion()">
                <i class="fas fa-arrow-right"></i> ข้อถัดไป
            </button>
        </div>
        
        <div id="resultContainer" class="result-container" style="display: none;">
            <h2 class="result-title">🎉 สำเร็จแล้ว!</h2>
            <div class="result-stats">
                <div class="stat-card">
                    <div class="stat-value" id="finalScore">0</div>
                    <div class="stat-label">คะแนนรวม</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="accuracy">0%</div>
                    <div class="stat-label">ความแม่นยำ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="timeSpent">0s</div>
                    <div class="stat-label">เวลาที่ใช้</div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="next-btn" onclick="restartQuiz()">
                    <i class="fas fa-redo"></i> เริ่มใหม่
                </button>
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-home"></i> กลับหน้าหลัก
                </button>
            </div>
        </div>
    </div>

    <script src="hiragana.js"></script>
    <script>
        // Game State
        let currentCharacter = '';
        let currentOptions = [];
        let correctAnswer = '';
        let score = 0;
        let currentQuestionIndex = 0;
        let totalQuestions = 46;
        let attempts = 3;
        let startTime = Date.now();
        let characterQueue = [];
        
        // Initialize game
        function initGame() {
            score = 0;
            currentQuestionIndex = 0;
            attempts = 3;
            startTime = Date.now();
            
            // Create queue of all hiragana characters
            characterQueue = HiraganaHelper.shuffleArray(HiraganaHelper.getAllCharacters());
            
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            generateQuestion();
        }
        
        // Generate new question
        function generateQuestion() {
            // Reset state
            attempts = 3;
            document.getElementById('attempts').textContent = attempts;
            document.getElementById('attemptsDisplay').style.display = 'inline-block';
            document.getElementById('feedbackMessage').innerHTML = '';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('soundHint').disabled = false;
            
            // Get next character from queue
            currentCharacter = characterQueue[currentQuestionIndex];
            correctAnswer = HiraganaHelper.getRomaji(currentCharacter);
            
            // Set hint text with first letter of romaji
            const firstLetter = correctAnswer.charAt(0).toUpperCase();
            document.getElementById('hintText').textContent = firstLetter;
            
            // Generate options
            const wrongAnswers = HiraganaHelper.generateWrongAnswers(currentCharacter, 2, true);
            currentOptions = [correctAnswer, ...wrongAnswers];
            currentOptions = HiraganaHelper.shuffleArray(currentOptions);
            
            // Update display
            document.getElementById('characterDisplay').textContent = currentCharacter;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('score').textContent = score;
            
            // Update progress bar
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Create option buttons
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            currentOptions.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option;
                button.onclick = () => checkAnswer(option, button);
                optionsContainer.appendChild(button);
            });
            
            }
        
        // Play sound
        function playSound() {
            HiraganaHelper.playSound(currentCharacter);
        }
        
        // Check answer
        function checkAnswer(answer, buttonElement) {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);
            
            const isCorrect = answer === correctAnswer;
            
            if (isCorrect) {
                buttonElement.classList.add('correct');
                score++;
                document.getElementById('score').textContent = score;
                
                showFeedback('ถูกต้อง! 🎉', 'correct');
                
                // Auto-proceed to next question after delay
                setTimeout(() => {
                    if (currentQuestionIndex < totalQuestions - 1) {
                        nextQuestion();
                    } else {
                        showResults();
                    }
                }, 1500);
            } else {
                buttonElement.classList.add('incorrect');
                attempts--;
                document.getElementById('attempts').textContent = attempts;
                
                // Show correct answer
                allButtons.forEach(btn => {
                    if (btn.textContent === correctAnswer) {
                        btn.classList.add('correct');
                    }
                });
                
                if (attempts > 0) {
                    showFeedback(`ผิด! ลองใหม่อีก ${attempts} ครั้ง`, 'incorrect');
                    setTimeout(() => {
                        allButtons.forEach(btn => {
                            btn.disabled = false;
                            btn.classList.remove('incorrect', 'correct');
                        });
                        document.getElementById('feedbackMessage').innerHTML = '';
                    }, 2000);
                } else {
                    showFeedback('หมดโอกาส! คำตอบที่ถูกต้องคือ: ' + correctAnswer, 'incorrect');
                    document.getElementById('nextBtn').style.display = 'inline-flex';
                }
            }
        }
        
        // Show feedback
        function showFeedback(message, type) {
            const feedbackElement = document.getElementById('feedbackMessage');
            feedbackElement.className = `feedback-message ${type}`;
            feedbackElement.textContent = message;
        }
        
        // Next question
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestions) {
                generateQuestion();
            } else {
                showResults();
            }
        }
        
        // Show results
        function showResults() {
            const endTime = Date.now();
            const timeSpent = Math.round((endTime - startTime) / 1000);
            const accuracy = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('timeSpent').textContent = timeSpent + 's';
            
            // Save score
            ScoreManager.saveScore(1, score, totalQuestions);
        }
        
        // Restart quiz
        function restartQuiz() {
            initGame();
        }
        
        // Go back to main page
        function goBack() {
            window.location.href = 'index.html';
        }
        
        // Initialize on load
        window.onload = function() {
            // Check for saved dark mode preference
            const body = document.body;
            if (localStorage.getItem('darkMode') === 'enabled') {
                body.classList.add('dark-mode');
            }
            
            initGame();
        };
    </script>
</body>
</html>
